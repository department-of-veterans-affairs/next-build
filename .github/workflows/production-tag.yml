name: Create Production Tag

on:
  workflow_dispatch:
    inputs:
      override_code_freeze:
        type: boolean
        description: "Override code freeze and create production tag"
        default: false
  workflow_run:
    workflows: ['Content release: Staging']
    types: [completed]
concurrency:
  group: production-tag
  cancel-in-progress: true

env:
  SLACK_CHANNEL: C06DSBT7CBW #status-next-build
  DSVA_SCHEDULE_ENABLED: true

jobs:
  holiday-checker:
    runs-on: ubuntu-latest
    outputs:
      is_holiday: ${{ steps.holiday-check.outputs.is_holiday }}
    steps:
      - name: Check if today is a holiday
        id: holiday-check
        uses: department-of-veterans-affairs/vsp-github-actions/holiday-checker@main
  check-parity:
    name: Check Environment Parity
    runs-on: ubuntu-latest
    # [TEST] Removed schedule gate so manual dispatch of staging triggers this.
    if: >
      github.event_name == 'workflow_run'
      && github.event.workflow_run.conclusion == 'success'
    outputs:
      parity: ${{ steps.check.outputs.parity }}
    steps:
      - name: Download parity report
        uses: actions/download-artifact@v4
        with:
          name: env-parity-report
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check parity result
        id: check
        run: |
          echo "Triggering workflow: ${{ github.event.workflow_run.html_url }}"
          if [ ! -f report.json ]; then
            echo "No parity report found"
            echo "parity=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          FAILED=$(jq '.summary.failed' report.json)
          if [ "$FAILED" -eq 0 ]; then
            echo "Environments are in parity"
            echo "parity=true" >> $GITHUB_OUTPUT
          else
            echo "Environments are not in parity ($FAILED pages differ)"
            echo "parity=false" >> $GITHUB_OUTPUT
          fi

  create-production-tag:
    name: Create Production Tag
    runs-on: ubuntu-latest
    needs: [holiday-checker, check-parity]
    # For workflow_dispatch: check-parity is skipped; proceed if not a holiday (or override)
    # For workflow_run: only proceed if check-parity confirmed environments are in parity
    #
    # **Note:** `always()` is required because check-parity is skipped on
    # workflow_dispatch (it only runs for workflow_run events). Without
    # always(), GitHub Actions would skip this job whenever any dependency is
    # skipped.
    if: >
      always()
      && needs.holiday-checker.result == 'success'
      && (needs.holiday-checker.outputs.is_holiday == 'false' || (inputs && inputs.override_code_freeze))
      && (
        github.event_name == 'workflow_dispatch'
        || (needs.check-parity.result == 'success' && needs.check-parity.outputs.parity == 'true')
      )
    # [TEST] Stripped steps — verify the job triggers but don't actually create a tag.
    steps:
      - run: echo "create-production-tag would run here"
